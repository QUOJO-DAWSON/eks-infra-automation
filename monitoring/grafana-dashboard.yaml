---
apiVersion: v1
kind: ConfigMap
metadata:
  name: eks-platform-overview
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  eks-platform-overview.json: |
    {
      "title": "EKS Platform Overview",
      "uid": "eks-platform-overview",
      "tags": ["eks", "kubernetes", "istio", "argocd"],
      "timezone": "browser",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "30s",
      "time": { "from": "now-3h", "to": "now" },
      "templating": {
        "list": [
          {
            "name": "namespace",
            "type": "query",
            "datasource": "Prometheus",
            "query": "label_values(kube_pod_info, namespace)",
            "refresh": 2,
            "includeAll": true,
            "allValue": ".*",
            "label": "Namespace"
          }
        ]
      },
      "panels": [
        {
          "id": 1, "title": "Ready Nodes", "type": "stat",
          "gridPos": { "x": 0, "y": 0, "w": 4, "h": 4 },
          "targets": [{ "expr": "sum(kube_node_status_condition{condition='Ready',status='true'})", "legendFormat": "Ready Nodes" }],
          "fieldConfig": { "defaults": { "thresholds": { "mode": "absolute", "steps": [{ "color": "red", "value": 0 }, { "color": "green", "value": 2 }] } } }
        },
        {
          "id": 2, "title": "Running Pods", "type": "stat",
          "gridPos": { "x": 4, "y": 0, "w": 4, "h": 4 },
          "targets": [{ "expr": "sum(kube_pod_status_phase{phase='Running'})", "legendFormat": "Running" }],
          "fieldConfig": { "defaults": { "thresholds": { "mode": "absolute", "steps": [{ "color": "red", "value": 0 }, { "color": "green", "value": 1 }] } } }
        },
        {
          "id": 3, "title": "Istio 5xx Error Rate %", "type": "stat",
          "gridPos": { "x": 8, "y": 0, "w": 4, "h": 4 },
          "targets": [{ "expr": "sum(rate(istio_requests_total{response_code=~'5..'}[5m])) / sum(rate(istio_requests_total[5m])) * 100", "legendFormat": "Error %" }],
          "fieldConfig": { "defaults": { "unit": "percent", "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": 0 }, { "color": "yellow", "value": 1 }, { "color": "red", "value": 5 }] } } }
        },
        {
          "id": 4, "title": "ArgoCD Synced Apps", "type": "stat",
          "gridPos": { "x": 12, "y": 0, "w": 4, "h": 4 },
          "targets": [{ "expr": "sum(argocd_app_info{sync_status='Synced'})", "legendFormat": "Synced" }],
          "fieldConfig": { "defaults": { "thresholds": { "mode": "absolute", "steps": [{ "color": "red", "value": 0 }, { "color": "green", "value": 1 }] } } }
        },
        {
          "id": 5, "title": "CPU Usage by Node", "type": "timeseries",
          "gridPos": { "x": 0, "y": 4, "w": 12, "h": 8 },
          "targets": [{ "expr": "(1 - avg by(node) (rate(node_cpu_seconds_total{mode='idle'}[5m]))) * 100", "legendFormat": "{{ node }}" }],
          "fieldConfig": { "defaults": { "unit": "percent", "min": 0, "max": 100 } }
        },
        {
          "id": 6, "title": "Memory Usage by Node", "type": "timeseries",
          "gridPos": { "x": 12, "y": 4, "w": 12, "h": 8 },
          "targets": [{ "expr": "(1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100", "legendFormat": "{{ instance }}" }],
          "fieldConfig": { "defaults": { "unit": "percent", "min": 0, "max": 100 } }
        },
        {
          "id": 7, "title": "Istio Request Rate by Service", "type": "timeseries",
          "gridPos": { "x": 0, "y": 12, "w": 12, "h": 8 },
          "targets": [{ "expr": "sum by(destination_service_name) (rate(istio_requests_total{destination_service_namespace=~'$namespace'}[5m]))", "legendFormat": "{{ destination_service_name }}" }],
          "fieldConfig": { "defaults": { "unit": "reqps" } }
        },
        {
          "id": 8, "title": "Istio p99 Latency by Service (ms)", "type": "timeseries",
          "gridPos": { "x": 12, "y": 12, "w": 12, "h": 8 },
          "targets": [{ "expr": "histogram_quantile(0.99, sum by(destination_service_name, le) (rate(istio_request_duration_milliseconds_bucket{destination_service_namespace=~'$namespace'}[5m])))", "legendFormat": "p99 {{ destination_service_name }}" }],
          "fieldConfig": { "defaults": { "unit": "ms" } }
        },
        {
          "id": 9, "title": "Pod Restarts (last 15m)", "type": "timeseries",
          "gridPos": { "x": 0, "y": 20, "w": 12, "h": 7 },
          "targets": [{ "expr": "sum by(pod, namespace) (increase(kube_pod_container_status_restarts_total{namespace=~'$namespace'}[15m])) > 0", "legendFormat": "{{ namespace }}/{{ pod }}" }],
          "fieldConfig": { "defaults": { "unit": "short" } }
        },
        {
          "id": 10, "title": "ArgoCD Sync Lag (seconds)", "type": "timeseries",
          "gridPos": { "x": 12, "y": 20, "w": 12, "h": 7 },
          "targets": [{ "expr": "time() - argocd_app_reconcile_sum / argocd_app_reconcile_count", "legendFormat": "{{ name }}" }],
          "fieldConfig": { "defaults": { "unit": "s" } }
        }
      ]
    }
