name: Deploy Infrastructure

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  TF_VERSION: "1.12.0"
  TF_IN_AUTOMATION: true

permissions:
  contents: read
  pull-requests: write
  id-token: write
  security-events: write

jobs:
  # --------------------------------------------------------------------------
  # Job 1: tfsec
  # --------------------------------------------------------------------------
  tfsec:
    name: Security Scan (tfsec)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tfsec
        run: |
          curl -sL https://github.com/aquasecurity/tfsec/releases/latest/download/tfsec-linux-amd64 -o /usr/local/bin/tfsec
          chmod +x /usr/local/bin/tfsec

      - name: Run tfsec (SARIF output)
        run: tfsec . --format sarif --out tfsec.sarif --soft-fail --workspace ${{ github.workspace }}
        continue-on-error: true

      - name: Run tfsec (human-readable summary)
        run: tfsec . --soft-fail
        continue-on-error: true

  # --------------------------------------------------------------------------
  # Job 2: Trivy
  # --------------------------------------------------------------------------
  trivy:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

      - name: Run Trivy IaC misconfiguration scan
        run: |
          trivy config . --severity CRITICAL,HIGH --exit-code 0
        continue-on-error: true

      - name: Run Trivy secret scan
        run: |
          trivy fs . --scanners secret --severity CRITICAL,HIGH --exit-code 1

  # --------------------------------------------------------------------------
  # Job 3: Validate and Plan
  # --------------------------------------------------------------------------
  terraform-plan:
    name: Validate and Plan Infrastructure
    runs-on: ubuntu-latest
    needs: [tfsec, trivy]
    outputs:
      plan-outcome: ${{ steps.plan.outcome }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Create Terraform plugin cache directory
        run: mkdir -p ~/.terraform.d/plugin-cache

      - name: Cache Terraform providers
        uses: actions/cache@v4.2.3
        with:
          path: ~/.terraform.d/plugin-cache
          key: ${{ runner.os }}-terraform-${{ hashFiles('**/.terraform.lock.hcl') }}

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.ACTIONS_AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: GitHubActions-InfraDeploy

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        run: |
          set +e
          terraform plan -no-color -input=false -detailed-exitcode -out=tfplan -refresh=false \
            -var="user_for_admin_role=${{ secrets.ADMIN_USER_ARN }}" \
            -var="user_for_dev_role=${{ secrets.DEV_USER_ARN }}"
          exitcode=$?
          echo "exitcode=$exitcode" >> $GITHUB_OUTPUT
          if [ "$exitcode" -eq 1 ]; then
            echo "Terraform plan failed"
            exit 1
          fi
          exit 0

      - name: Capture Plan Output
        run: terraform show -no-color tfplan > plan_output.txt
        continue-on-error: true

      - name: Upload Plan artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: tfplan-${{ github.run_id }}
          path: tfplan
          retention-days: 5

      - name: Comment Plan on PR
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const planOutput = fs.readFileSync('plan_output.txt', 'utf8');
            const maxLength = 60000;
            const truncated = planOutput.length > maxLength
              ? planOutput.substring(0, maxLength) + '\n\n... output truncated ...'
              : planOutput;

            const fmtIcon  = '${{ steps.fmt.outcome }}'      === 'success' ? ':white_check_mark:' : ':x:';
            const initIcon = '${{ steps.init.outcome }}'     === 'success' ? ':white_check_mark:' : ':x:';
            const valIcon  = '${{ steps.validate.outcome }}' === 'success' ? ':white_check_mark:' : ':x:';
            const planIcon = '${{ steps.plan.outcome }}'     === 'success' ? ':white_check_mark:' : ':x:';

            const body = [
              '## Terraform Plan',
              '',
              `| Step | Result |`,
              `|------|--------|`,
              `| Format Check | ${fmtIcon} \`${{ steps.fmt.outcome }}\` |`,
              `| Init         | ${initIcon} \`${{ steps.init.outcome }}\` |`,
              `| Validate     | ${valIcon} \`${{ steps.validate.outcome }}\` |`,
              `| Plan         | ${planIcon} \`${{ steps.plan.outcome }}\` |`,
              '',
              '<details><summary>Show Plan Output</summary>',
              '',
              '```terraform',
              truncated,
              '```',
              '',
              '</details>',
              '',
              `> Triggered by @${{ github.actor }} via \`${{ github.event_name }}\``
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            for (const comment of comments) {
              if (comment.user.type === 'Bot' && comment.body.includes('Terraform Plan')) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: comment.id,
                });
              }
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

  # --------------------------------------------------------------------------
  # Job 4: Apply (main branch only)
  # --------------------------------------------------------------------------
  apply:
    name: Apply Infrastructure
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Restore Terraform provider cache
        uses: actions/cache@v4.2.3
        with:
          path: ~/.terraform.d/plugin-cache
          key: ${{ runner.os }}-terraform-${{ hashFiles('**/.terraform.lock.hcl') }}

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.ACTIONS_AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: GitHubActions-Apply

      - name: Terraform Init
        run: terraform init

      - name: Phase 1 - Apply AWS Infrastructure
        run: |
          terraform apply -auto-approve \
            -target=module.vpc \
            -target=module.eks \
            -target=aws_iam_role.external-admin \
            -target=aws_iam_role.external-developer \
            -target=aws_iam_role_policy_attachment.external-admin \
            -target=aws_iam_role_policy_attachment.external-developer \
            -var="user_for_admin_role=${{ secrets.ADMIN_USER_ARN }}" \
            -var="user_for_dev_role=${{ secrets.DEV_USER_ARN }}"

      - name: Phase 1.5 - Install Kyverno (CRD bootstrap)
        run: |
          terraform apply -auto-approve \
            -target=helm_release.kyverno \
            -var="user_for_admin_role=${{ secrets.ADMIN_USER_ARN }}" \
            -var="user_for_dev_role=${{ secrets.DEV_USER_ARN }}"

      - name: Pre-Phase 2 Cleanup - Remove stuck Helm releases
        run: |
          aws eks update-kubeconfig --region ${{ vars.AWS_REGION }} --name eks-platform-eks-cluster
          helm uninstall kube-prometheus-stack -n monitoring 2>/dev/null || true
          helm uninstall argo-cd -n argocd 2>/dev/null || true

      - name: Phase 2 - Apply Platform Add-ons
        run: |
          terraform apply -auto-approve \
            -var="user_for_admin_role=${{ secrets.ADMIN_USER_ARN }}" \
            -var="user_for_dev_role=${{ secrets.DEV_USER_ARN }}"

      - name: Extract Cluster Name
        run: |
          CLUSTER_NAME=$(terraform output -raw cluster_name || echo "")
          echo "CLUSTER_NAME=$CLUSTER_NAME" >> $GITHUB_ENV

      - name: Verify Deployment
        if: env.CLUSTER_NAME != ''
        run: |
          aws eks update-kubeconfig --name $CLUSTER_NAME --region ${{ vars.AWS_REGION }}
          kubectl get nodes
          kubectl get pods --all-namespaces
