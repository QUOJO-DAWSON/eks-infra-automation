apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: onlineboutique-staging
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/QUOJO-DAWSON/online-boutique-gitops.git
    targetRevision: main
    path: overlays/staging
  destination:
    server: https://kubernetes.default.svc
    namespace: online-boutique-staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true